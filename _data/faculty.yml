- name: Alberto Castellini, Ph.D.
  photo: alberto.png
  website: http://profs.scienze.univr.it/~castellini/

  info: Alberto Castellini is an Associate Professor at the Computer Science department of the University of Verona. His research interests focus on the development of Artificial Intelligence, Machine Learning and Data Analysis techniques, with applications on intelligent systems of various kinds, such as, cyber-physical systems, robotic systems, smart grids and smart buildings. The main methodologies he works on are predictive models for multivariate time series, methods for planning under uncertainty, reinforcement learning, regression and clustering techniques, interpretability of predictive models, situation assessment and anomaly detection.

  email: alberto.castellini@univr.it


- name: Daniele Meli, Ph.D.
  photo: daniele.png
  website: https://www.di.univr.it/?ent=persona&id=46391&lang=en
  

  info: Daniele Meli is an Assistant Professor at the Department of Computer Science. He received his Master’s degree in Automation Engineering from Politecnico di Bari, IT, in 2017, and his PhD in Computer Science at University of Verona in 2021. He is currently a tenure-track researcher and assistant professor in Artificial intelligence at University of Verona. His research is mainly focused on explainable artificial intelligence, with specific applications to robotic task and motion planning, neurosymbolic methods for reinforcement learning, and causal discovery for anomaly detection. He also serves as a reviewer for main AI and robotics conferences and journals, including ICRA, IROS, JAIR, AAMAS, IJCAI, NeSy, and as an Associate Editor for IROS and Italian AI Journal. 

  email: daniele.meli@univr.it
