  info: Edoardo is a National PhD student at Sapienza University of Rome, also affiliated withthe University of Verona, where he is currently located. He is supervised by Prof. Alessandro Farinelli and Prof. Luca Iocchi. His research interests focus on multimodal models for robotics, embodied AI, and reinforcement learning, with particular emphasis on integrating visual and textual modalities to develop intelligent systems that can perceive, reason, and act effectively in complex, real-world environments.
